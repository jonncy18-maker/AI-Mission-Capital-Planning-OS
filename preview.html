<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Capital Planning OS — Preview</title>
<link rel="stylesheet" href="src/tokens.css" />
<link rel="stylesheet" href="src/app.css" />
<style>
  html, body { margin: 0; padding: 0; }
  /* Preview-only: sample-data ghost button in the empty state */
  .cos-sample-link {
    background: transparent; border: none; cursor: pointer;
    font-family: var(--font-mono); font-size: var(--fs-label); font-weight: 500;
    letter-spacing: var(--ls-label); text-transform: uppercase;
    color: var(--text-muted); border-bottom: 1px solid var(--rule-strong);
    padding: 4px 0; transition: color var(--transition), border-color var(--transition);
  }
  .cos-sample-link:hover { color: var(--accent); border-color: var(--accent); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ── Inlined FY26 category map (mirrors src/constants/categories.js) ── */
const GROUP_BUDGETS = {
  'Housing':11466,'Food & Dining':15650,'Travel & Lifestyle':22091,'Gifts & Donations':9317,
  'Auto & Transport':9904,'Health & Wellness':2640,'Financial':6117,'Shopping':3775,
  'Education':3000,'Bills & Utilities':4332,'Other':500,
};
const GROUP_ORDER = Object.keys(GROUP_BUDGETS);
const mo = a => Math.round(a/12);
const CATEGORIES = {
  'Housing':[['Rent','fixed',9000],['Property Tax','nonMonthly',1200],['Home Improvement','nonMonthly',600],['Home Supplies','flexible',666]],
  'Food & Dining':[['Groceries','flexible',8500],['Restaurants','flexible',4500],['Fast Food','flexible',1000],['Coffee Shops','flexible',1000],['Alcohol & Bars','flexible',650]],
  'Travel & Lifestyle':[['Cruise','nonMonthly',8000],['Airfare','nonMonthly',6000],['Hotels','nonMonthly',4000],['Entertainment','flexible',2091],['Subscriptions','fixed',2000]],
  'Gifts & Donations':[['Philippine Transfers','fixed',7317],['Charity','flexible',1500],['Gifts','nonMonthly',500]],
  'Auto & Transport':[['Auto Payment','fixed',5000],['Gas','flexible',2400],['Auto Insurance','fixed',1200],['Auto Maintenance','nonMonthly',700],['Parking & Tolls','flexible',604]],
  'Health & Wellness':[['Medical','flexible',1000],['Dental','nonMonthly',500],['Fitness','fixed',840],['Pharmacy','flexible',300]],
  'Financial':[['Advisory Fee','fixed',3600],['Financial Fees','flexible',1200],['Taxes','nonMonthly',1317]],
  'Shopping':[['Clothing','flexible',1600],['Electronics','nonMonthly',1000],['Home Goods','flexible',600],['General Merchandise','flexible',575]],
  'Education':[['Tuition','fixed',2400],['Books & Supplies','nonMonthly',600]],
  'Bills & Utilities':[['Electric','flexible',1800],['Phone','fixed',900],['Internet','fixed',900],['TV Streaming Services','fixed',732]],
  'Other':[['Miscellaneous','flexible',500]],
};
const MISSION_CAPITAL = [
  {key:'education',label:'Mission Education',note:'Education group + Philippine Transfers',annual:8465,monthly:706},
  {key:'family',label:'Family Support',note:'Netflix < $6 split only',annual:1852,monthly:154},
  {key:'nextgen',label:'NextGen Nurses',note:'Netflix ≥ $6 split',annual:84,monthly:7},
];

/* ── Sample month (this month) actuals — illustrative ── */
const SAMPLE_ACTUALS = {
  'Housing':{'Rent':750,'Property Tax':0,'Home Improvement':180,'Home Supplies':64},
  'Food & Dining':{'Groceries':760,'Restaurants':410,'Fast Food':64,'Coffee Shops':96,'Alcohol & Bars':38},
  'Travel & Lifestyle':{'Cruise':0,'Airfare':0,'Hotels':0,'Entertainment':150,'Subscriptions':167},
  'Gifts & Donations':{'Philippine Transfers':610,'Charity':100,'Gifts':45},
  'Auto & Transport':{'Auto Payment':417,'Gas':245,'Auto Insurance':100,'Auto Maintenance':0,'Parking & Tolls':38},
  'Health & Wellness':{'Medical':60,'Dental':0,'Fitness':70,'Pharmacy':32},
  'Financial':{'Advisory Fee':300,'Financial Fees':85,'Taxes':0},
  'Shopping':{'Clothing':210,'Electronics':0,'Home Goods':44,'General Merchandise':60},
  'Education':{'Tuition':200,'Books & Supplies':35},
  'Bills & Utilities':{'Electric':168,'Phone':75,'Internet':75,'TV Streaming Services':61},
  'Other':{'Miscellaneous':28},
};
function buildSampleGroups(){
  const groups={};
  for(const g of GROUP_ORDER){
    const cats=SAMPLE_ACTUALS[g]||{};
    const total=Object.values(cats).reduce((s,v)=>s+v,0);
    groups[g]={total,categories:{...cats}};
  }
  return {groups, transactionCount:184, netflixSplit:{nextgen:8,family:12}};
}
const SAMPLE_MISSION_SPENT = {education:5240,family:920,nextgen:52};

const SAMPLE_BRIEFING =
  "The household closed the month $1,660 under the monthly plan, carried almost entirely by Travel & Lifestyle, where no trip cleared and the Cruise and Airfare reserves sat untouched [[flag:ok]]. Holding that line is what keeps the year on track. " +
  "Discretionary spending is where the pressure shows. Food & Dining ran 5% over its monthly target, with Restaurants and Coffee Shops both stepping past plan [[flag:watch]], and Shopping was carried over by a single Clothing purchase [[flag:over]]. Home Improvement also drew $180 against a thin non-monthly reserve [[flag:over]]. None of these are structural — they are timing, not trend. " +
  "The mission commitments held exactly to plan: Philippine Transfers cleared in full and the Mission Education bucket tracks to its $8,465 annual figure [[flag:ok]]. Recommendation: let the dining categories self-correct next month before adjusting any target, and keep the travel reserves intact for the booked cruise.";

/* ── tokenizer (mirrors anthropic.js) ── */
function tokenizeBriefing(text){
  const tokens=[]; const re=/\[\[flag:(over|watch|ok)\]\]/g; let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last) tokens.push({type:'text',value:text.slice(last,m.index)});
    tokens.push({type:'flag',level:m[1]}); last=re.lastIndex;
  }
  if(last<text.length) tokens.push({type:'text',value:text.slice(last)});
  return tokens;
}

/* ── helpers ── */
const fmt = n => '$'+Math.round(n).toLocaleString('en-US');
function statusOf(a,b){ if(b<=0) return 'ok'; const r=a/b; if(r>1.0) return 'over'; if(r>=0.9) return 'watch'; return 'ok'; }
const BORDER={over:'var(--alert)',watch:'var(--warn)',ok:'var(--ok)'};
const STCLS={over:'is-alert',watch:'is-warn',ok:'is-ok'};

/* ── minimal inline Monarch parser (mirrors csvParser.js) ── */
function splitCsvLine(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(q){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"'){q=false;}else cur+=c;}else if(c==='"'){q=true;}else if(c===','){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out.map(s=>s.trim());}
function parseCsv(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const h=splitCsvLine(lines[0]).map(s=>s.toLowerCase());
  const iC=h.indexOf('category'),iG=h.indexOf('group'),iA=h.indexOf('amount');
  if(iC<0||iG<0||iA<0) throw new Error('CSV missing Category / Group / Amount columns.');
  const groups={}; let n=0;
  for(let r=1;r<lines.length;r++){const c=splitCsvLine(lines[r]);const g=c[iG]||'Other';if(g==='Business')continue;
    const cat=c[iC]||'Uncategorized';const amt=Math.abs(parseFloat(String(c[iA]).replace(/[$,]/g,''))||0);
    if(!groups[g])groups[g]={total:0,categories:{}};groups[g].total+=amt;groups[g].categories[cat]=(groups[g].categories[cat]||0)+amt;n++;}
  return {groups,transactionCount:n,netflixSplit:{nextgen:0,family:0}};
}

/* ════════════════════ COMPONENTS ════════════════════ */
const PERIODS=[['month','This Month'],['rolling30','Rolling 30'],['ytd','YTD'],['lastYear','Last Year'],['custom','Custom'],['forecast','Forecast · EOY']];
const STATUS={ontrack:['On Track','is-ok'],watch:['Watch','is-warn'],alert:['Alert','is-alert']};

function Header({hasData,period,onPeriod,status,dark,onToggleTheme,onUpload,onFile,lastUpdated}){
  const fileRef=useRef(null);
  const [label,cls]=STATUS[status]||STATUS.ontrack;
  return (
    <header className="cos-header">
      <div className="cos-header-row">
        <div className="cos-wordmark">
          <span className="cos-wordmark-mark">CP</span>
          <span className="cos-wordmark-text">Capital&nbsp;Planning&nbsp;<em className="cos-italic">OS</em></span>
        </div>
        <div className="cos-header-tools">
          {hasData && <span className={"cos-status-pill "+cls}><span className="cos-status-dot"/>{label}</span>}
          <button className="cos-theme-toggle" onClick={onToggleTheme} title={dark?'Light mode':'Dark mode'}>{dark?'☼':'☾'}</button>
          <button className="cos-upload-btn" onClick={()=>fileRef.current&&fileRef.current.click()}>{hasData?'Replace CSV':'Upload CSV'}</button>
          <input ref={fileRef} type="file" accept=".csv,text/csv" hidden onChange={e=>{const f=e.target.files&&e.target.files[0];if(f)onFile(f);e.target.value='';}}/>
        </div>
      </div>
      <div className="cos-period-row">
        <nav className={"cos-period-tabs "+(hasData?'':'is-disabled')}>
          {PERIODS.map(([k,l])=>(
            <button key={k} disabled={!hasData} className={"cos-period-tab "+(period===k?'is-active':'')} onClick={()=>onPeriod(k)}>{l}</button>
          ))}
        </nav>
        <span className="cos-updated cos-label">{lastUpdated?('Updated '+lastUpdated):'No data loaded'}</span>
      </div>
    </header>
  );
}

const FLAG_TEXT={over:'OVER',watch:'WATCH',ok:'OK'};
function Flag({level}){return <span className={"cos-flag "+STCLS[level]}>{FLAG_TEXT[level]}</span>;}

function BriefingCard({hasData,briefing,period,onUpload,onSample}){
  if(!hasData){
    return (
      <section className="cos-card cos-briefing">
        <div className="cos-empty">
          <div className="cos-empty-mark">↥</div>
          <span className="cos-eyebrow">Awaiting data</span>
          <h2 className="cos-hero cos-empty-title">Upload a Monarch export to open the&nbsp;<em className="cos-italic">books.</em></h2>
          <p className="cos-body cos-empty-body">Drop in a Monarch Money CSV and the OS will roll your categories up to groups, measure them against the FY26 plan, and draft an executive briefing.</p>
          <button className="cos-upload-btn cos-upload-btn--lg" onClick={onUpload}>Upload CSV</button>
          <button className="cos-sample-link" onClick={onSample}>or load sample data</button>
        </div>
      </section>
    );
  }
  const periodLabel=(PERIODS.find(p=>p[0]===period)||['','This Month'])[1];
  const tokens=tokenizeBriefing(briefing);
  return (
    <section className="cos-card cos-briefing">
      <div className="cos-card-head"><span className="cos-eyebrow">Executive Briefing</span><span className="cos-label">{periodLabel}</span></div>
      <h2 className="cos-hero cos-briefing-title">The month, in&nbsp;<em className="cos-italic">brief.</em></h2>
      <div className="cos-briefing-body cos-body">
        {tokens.map((t,i)=>t.type==='flag'?<Flag key={i} level={t.level}/>:<span key={i}>{t.value}</span>)}
      </div>
    </section>
  );
}

function CategorySnapshot({groups}){
  return (
    <section className="cos-card cos-snapshot">
      <div className="cos-card-head"><span className="cos-eyebrow">Category Snapshot</span><span className="cos-label">Actual / Budget · Monthly</span></div>
      <div className="cos-snap-grid">
        <div className="cos-snap-colhead cos-label"><span>Category</span><span className="cos-snap-num">Actual</span><span className="cos-snap-num">Budget</span></div>
        {GROUP_ORDER.map(group=>{
          const cats=CATEGORIES[group]||[];
          const gActual=(groups[group]&&groups[group].total)||0;
          const gBudget=mo(GROUP_BUDGETS[group]||0);
          const gs=statusOf(gActual,gBudget);
          return (
            <div className="cos-snap-group" key={group}>
              <div className="cos-snap-grouprow">
                <span className="cos-snap-groupname">{group}</span>
                <span className={"cos-snap-num cos-mono "+STCLS[gs]}>{fmt(gActual)}</span>
                <span className="cos-snap-num cos-mono cos-snap-budget">{fmt(gBudget)}</span>
              </div>
              {cats.map(([name,type,annual])=>{
                const actual=(groups[group]&&groups[group].categories[name])||0;
                const budget=mo(annual);
                const st=statusOf(actual,budget);
                return (
                  <div className="cos-snap-row" key={name} style={{borderTopColor:BORDER[st]}}>
                    <span className="cos-snap-catname">{name}{type==='nonMonthly'&&<span className="cos-snap-tag cos-label">{fmt(annual)}/yr</span>}</span>
                    <span className="cos-snap-num cos-mono">{fmt(actual)}</span>
                    <span className="cos-snap-num cos-mono cos-snap-budget">{fmt(budget)}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </section>
  );
}

function Sidebar({hasData,summary,missionSpent}){
  return (
    <aside className={"cos-sidebar "+(hasData?'':'is-placeholder')}>
      <section className="cos-side-block">
        <span className="cos-eyebrow">Period Summary</span>
        <div className="cos-sum-list">
          {hasData?(
            <React.Fragment>
              {[['Total Spent',fmt(summary.actual),true],['Budgeted',fmt(summary.budget),false],
                ['Variance',(summary.actual<=summary.budget?'−':'+')+fmt(Math.abs(summary.budget-summary.actual)),false],
                ['Transactions',String(summary.transactionCount),false],['Groups',String(summary.groupCount),false]].map(([k,v,acc])=>(
                <div className="cos-sum-row" key={k}><span className="cos-label">{k}</span><span className={"cos-mono cos-sum-val "+(acc?'cos-sum-accent':'')}>{v}</span></div>
              ))}
            </React.Fragment>
          ):(['Total Spent','Budgeted','Variance','Transactions','Groups'].map(k=>(
            <div className="cos-sum-row" key={k}><span className="cos-label">{k}</span><span className="cos-ph-bar"/></div>
          )))}
        </div>
      </section>
      <section className="cos-side-block">
        <span className="cos-eyebrow">Mission Capital</span>
        <div className="cos-mission-list">
          {MISSION_CAPITAL.map(item=>{
            if(!hasData) return (
              <div className="cos-mission-item" key={item.key}>
                <div className="cos-mission-top"><span className="cos-mission-label cos-ph-text">{item.label}</span></div>
                <div className="cos-bar"><div className="cos-bar-fill" style={{width:'0%'}}/></div>
              </div>
            );
            const spent=(missionSpent&&missionSpent[item.key])||0;
            const pct=item.annual>0?Math.min(100,Math.round(spent/item.annual*100)):0;
            return (
              <div className="cos-mission-item" key={item.key}>
                <div className="cos-mission-top"><span className="cos-mission-label">{item.label}</span><span className="cos-mono cos-mission-pct">{pct}%</span></div>
                <div className="cos-bar"><div className="cos-bar-fill" style={{width:pct+'%'}}/></div>
                <div className="cos-mission-foot"><span className="cos-label">{item.note}</span><span className="cos-mono cos-mission-amt">{fmt(spent)} / {fmt(item.annual)}</span></div>
              </div>
            );
          })}
        </div>
      </section>
      <section className="cos-side-block cos-scenario">
        <div className="cos-scenario-head"><span className="cos-eyebrow">Scenarios</span><span className="cos-phase-chip cos-label">Phase 2 · Coming Soon</span></div>
        <p className="cos-body cos-scenario-body">Model raises, big purchases, and mission commitments against the plan — and see the briefing rewrite itself.</p>
        <div className="cos-scenario-ghost"><span className="cos-ph-bar" style={{width:'70%'}}/><span className="cos-ph-bar" style={{width:'45%'}}/><span className="cos-ph-bar" style={{width:'60%'}}/></div>
      </section>
    </aside>
  );
}

const FOOTER_NAV=['Briefing','Categories','Mission','Settings'];

function App(){
  const [dark,setDark]=useState(false);
  const [period,setPeriod]=useState('month');
  const [parsed,setParsed]=useState(null);
  const [lastUpdated,setLastUpdated]=useState(null);
  const [isMobile,setIsMobile]=useState(false);
  const [activeNav,setActiveNav]=useState('Briefing');
  const [error,setError]=useState('');

  useEffect(()=>{const mq=window.matchMedia('(max-width: 960px)');const f=()=>setIsMobile(mq.matches);f();mq.addEventListener('change',f);return()=>mq.removeEventListener('change',f);},[]);

  const stamp=()=>setLastUpdated(new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}));

  function loadSample(){ setParsed(buildSampleGroups()); setError(''); stamp(); }
  function handleFile(file){
    const reader=new FileReader();
    reader.onload=()=>{try{setParsed(parseCsv(String(reader.result)));setError('');stamp();}catch(e){setError(e.message);}};
    reader.readAsText(file);
  }

  const hasData=!!parsed;
  const summary=useMemo(()=>{
    if(!parsed) return null;
    const actual=Object.values(parsed.groups).reduce((s,g)=>s+g.total,0);
    const budget=GROUP_ORDER.reduce((s,g)=>s+mo(GROUP_BUDGETS[g]||0),0);
    return {actual,budget,transactionCount:parsed.transactionCount,groupCount:Object.keys(parsed.groups).length};
  },[parsed]);
  const missionSpent=useMemo(()=>{
    if(!parsed) return null;
    const educationActual=(parsed.groups['Education']?.total||0)+(parsed.groups['Gifts & Donations']?.categories?.['Philippine Transfers']||0);
    return {education:educationActual,family:parsed.netflixSplit.family,nextgen:parsed.netflixSplit.nextgen};
  },[parsed]);
  const status=useMemo(()=>{if(!summary)return'ontrack';const r=summary.actual/summary.budget;if(r>1.0)return'alert';if(r>=0.92)return'watch';return'ontrack';},[summary]);

  return (
    <div id="cosRoot" className={dark?'dark':''}>
      <div className={"cos-shell "+(isMobile?'is-mobile':'')}>
        <Header hasData={hasData} period={period} onPeriod={setPeriod} status={status}
          dark={dark} onToggleTheme={()=>setDark(d=>!d)} onFile={handleFile} lastUpdated={lastUpdated}
          onUpload={()=>document.querySelector('input[type=file]').click()}/>
        <main className="cos-main">
          <div className="cos-main-col">
            <BriefingCard hasData={hasData} briefing={SAMPLE_BRIEFING} period={period}
              onUpload={()=>document.querySelector('input[type=file]').click()} onSample={loadSample}/>
            {error && <p className="cos-body is-alert" style={{padding:'0 8px'}}>{error}</p>}
            {hasData && <CategorySnapshot groups={parsed.groups}/>}
          </div>
          <Sidebar hasData={hasData} summary={summary} missionSpent={missionSpent||SAMPLE_MISSION_SPENT}/>
        </main>
        <footer className="cos-footer">
          <nav className="cos-footer-nav">
            {FOOTER_NAV.map(item=>(<button key={item} className={"cos-footer-link "+(activeNav===item?'is-active':'')} onClick={()=>setActiveNav(item)}>{item}</button>))}
          </nav>
          <span className="cos-footer-mark cos-label">Capital Planning OS</span>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
